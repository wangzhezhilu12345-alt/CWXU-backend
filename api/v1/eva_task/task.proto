syntax = "proto3";

package api.v1.eva_task;
import "google/api/annotations.proto";
option go_package = "edu-evaluation-backed/api/v1/eva_task;eva_task";
option java_multiple_files = true;
option java_package = "api.v1.eva_task";

service Task {
  rpc CreateTask(CreateTaskReq) returns (CreateTaskResp) {
    option (google.api.http) = {
      post: "/api/v1/task/create"
      body: "*"
    };
  }
  rpc List(GetTaskListReq) returns (GetTaskListResp) {
    option (google.api.http) = {
      get: "/api/v1/task/list"
    };
  }
  rpc StudentTaskDetail(StuTaskDetailReq) returns (StuTaskDetailRes) {
    option (google.api.http) = {
      get: "/api/v1/task/student_task_detail"
    };
  }
  rpc Detail(GetTaskReq) returns (TaskInfo) {
    option (google.api.http) = {
      get: "/api/v1/task/detail"
    };
  }
  rpc ChangeStatus(ChangeTaskStatusReq) returns (ChangeTaskStatusResp) {
    option (google.api.http) = {
      post: "/api/v1/task/change_status"
      body: "*"
    };
  }
  rpc SubmitEvaluation(SubmitEvaluationReq) returns (SubmitEvaluationResp) {
    option (google.api.http) = {
      post: "/api/v1/task/submit_evaluation"
      body: "*"
    };
  }
  rpc ExportTaskResults(ExportTaskResultsReq) returns (ExportTaskResultsResp) {
    option (google.api.http) = {
      get: "/api/v1/task/export"
    };
  }
}
message CourseInfo {
  string id = 1;
  string name = 2;
  int32 evaluationScore = 3;
  int32 evaluationNum = 4;
  int32 totalNum = 5;
  message TeacherInfo {
    string id = 1;
    string name = 2;
    bool hasEvaluation = 3;
  }
  repeated TeacherInfo teacher = 6;
}
message TaskInfo {
  string id = 1;
  string name = 2;
  int32 status = 3;

  repeated CourseInfo course = 4;
}

message CreateTaskReq {
  string name = 1;
  repeated int32 courseIds = 2;
}

message CreateTaskResp {
  string message = 1;
  message d {
    string id = 1;
  }
  d data = 2;

}

message GetTaskReq {
  string id = 1;
}

message GetTaskListReq {
  int32 status = 1;
  int32 page = 2;
  int32 pageSize = 3;
}

message GetTaskListResp {
  string message = 1;
  message d {
    repeated TaskInfo tasks = 1;
    int64 total = 2;
  }
  d data = 2;
}

message ChangeTaskStatusReq {
  int32 id = 1;
  int32 status = 2;
}

message ChangeTaskStatusResp {
  string message = 1;
}

message StuTaskDetailReq {
  uint32 taskId = 1;
  string stuNo = 2;
}
message StuTaskDetailRes {
  string message = 1;
  repeated CourseInfo course = 2;
}

message SubmitEvaluationReq {
  uint32 taskId = 1;
  uint32 courseId = 2;
  uint32 teacherId = 3;
  string stuNo = 4;
  string detailScore = 5;
  int32 score = 6;
  string comment = 7;
}

message SubmitEvaluationResp {
  string message = 1;
}

message ExportTaskResultsReq {
  uint32 taskId = 1;
}

message ExportTaskResultsResp {
  string message = 1;
  string zipPath = 4;
}