syntax = "proto3";

package api.v1.base_info.course;
import "google/api/annotations.proto";
import "api/v1/base_info/teacher/teacher.proto";
import "api/v1/base_info/student/student.proto";
option go_package = "edu-evaluation-backed/api/v1/base_info/course;course";
option java_multiple_files = true;
option java_package = "api.v1.base_info.course";

service Course {
  rpc List (GetCourseListReq) returns (GetCourseListResp) {
    option (google.api.http) = {
      get: "/api/v1/base-info/course/list",
    };
  }
  rpc Detail (GetCourseDetailReq) returns (GetCourseDetailResp) {
    option (google.api.http) = {
      get: "/api/v1/base-info/course/detail",
    };
  }
  rpc Edit (EditCourseReq) returns (EditCourseResp) {
    option (google.api.http) = {
      post: "/api/v1/base-info/course/edit",
      body: "*",
    };
  }
  rpc Delete (DeleteCourseReq) returns (DeleteCourseResp) {
    option (google.api.http) = {
      post: "/api/v1/base-info/course/delete",
      body: "*",
    };
  }
  rpc Reset (ResetReq) returns (ResetResp) {
    option (google.api.http) = {
      post: "/api/v1/base-info/reset",
      body: "*",
    };
  }
}

message CourseList {
  uint32 id = 1;
  string courseName = 2;
  string className = 3;
  int32 status = 6;
  repeated api.v1.base_info.teacher_i.TeacherInfo teacherList = 4;
  repeated api.v1.base_info.student_i.StudentInfo studentList = 5;
}

message GetCourseListReq {
  int32 page = 1;
  int32 pageSize = 2;
}

message GetCourseListResp {
  string message = 1;
  repeated CourseList data = 2;
  int64 total = 3;
}

message GetCourseDetailReq {
  int32 courseId = 1;
}

message GetCourseDetailResp {
  string message = 1;
  CourseList data = 2;
}

message EditCourseReq {
  int32 courseId = 1;
  string courseName = 2;
  string className = 3;
  repeated int32 teacherIds = 4;
}

message EditCourseResp {
  string message = 1;
  CourseList data = 2;
}

message DeleteCourseReq {
  uint32 id = 1;
}

message DeleteCourseResp {
  string message = 1;
}

message ResetReq {
}

message ResetResp {
  string message = 1;
}
